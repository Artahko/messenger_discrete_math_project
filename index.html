<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bello</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a1628;
      color: #fff;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .sidebar {
      width: 320px;
      flex-shrink: 0;
      background: #0d1b2e;
      border-right: 1px solid #1a2942;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 20px 16px 16px;
      border-bottom: 1px solid #1a2942;
    }

    .sidebar-header h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 14px;
      letter-spacing: -0.3px;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #4a5f7f;
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: #0a1628;
      color: #fff;
      border: 1px solid #1a2942;
      border-radius: 10px;
      padding: 9px 14px 9px 38px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input::placeholder { color: #4a5f7f; }
    .search-input:focus { border-color: #2563eb; }

    .chat-list {
      flex: 1;
      overflow-y: auto;
    }

    .chat-list::-webkit-scrollbar { width: 4px; }
    .chat-list::-webkit-scrollbar-track { background: transparent; }
    .chat-list::-webkit-scrollbar-thumb { background: #1a2942; border-radius: 4px; }

    .chat-item {
      padding: 14px 16px;
      border-bottom: 1px solid #1a2942;
      cursor: pointer;
      transition: background 0.12s;
    }

    .chat-item:hover { background: #0a1628; }
    .chat-item.active { background: #0a1628; }

    .chat-item-inner {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: #1e3a5f;
      color: #60a5fa;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .chat-meta {
      flex: 1;
      min-width: 0;
    }

    .chat-meta-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .chat-name {
      font-size: 15px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-time {
      font-size: 12px;
      color: #4a5f7f;
      flex-shrink: 0;
      margin-left: 8px;
    }

    .chat-meta-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-preview {
      font-size: 13px;
      color: #6b7f9f;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .unread-badge {
      background: #2563eb;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 20px;
      min-width: 20px;
      text-align: center;
      flex-shrink: 0;
      margin-left: 8px;
    }

    .chat-window {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0a1628;
      min-width: 0;
    }

    .chat-topbar {
      padding: 14px 20px;
      border-bottom: 1px solid #1a2942;
      background: #0d1b2e;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-topbar .avatar { width: 40px; height: 40px; font-size: 12px; }

    .chat-topbar-name {
      font-size: 16px;
      font-weight: 500;
    }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-track { background: transparent; }
    .messages-area::-webkit-scrollbar-thumb { background: #1a2942; border-radius: 4px; }

    .message-row {
      display: flex;
    }

    .message-row.sent { justify-content: flex-end; }
    .message-row.received { justify-content: flex-start; }

    .bubble {
      max-width: 420px;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message-row.sent .bubble {
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message-row.received .bubble {
      background: #0d1b2e;
      color: #fff;
      border-bottom-left-radius: 4px;
    }

    .bubble-text { margin-bottom: 4px; }

    .bubble-time {
      font-size: 11px;
      display: block;
      text-align: right;
    }

    .message-row.sent .bubble-time { color: #93c5fd; }
    .message-row.received .bubble-time { color: #4a5f7f; }

    .input-bar {
      padding: 14px 20px;
      border-top: 1px solid #1a2942;
      background: #0d1b2e;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .msg-input {
      flex: 1;
      background: #0a1628;
      color: #fff;
      border: 1px solid #1a2942;
      border-radius: 24px;
      padding: 12px 18px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .msg-input::placeholder { color: #4a5f7f; }
    .msg-input:focus { border-color: #2563eb; }

    .send-btn {
      width: 46px;
      height: 46px;
      background: #2563eb;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .send-btn:hover { background: #1d4ed8; }
    .send-btn svg { color: #fff; }

    .no-messages {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4a5f7f;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h1>Bello</h1>
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="search-input" type="text" placeholder="Пошук" id="searchInput" />
    </div>
  </div>
  <div class="chat-list" id="chatList"></div>
</div>

<div class="chat-window">
  <div class="chat-topbar" id="chatTopbar"></div>
  <div class="messages-area" id="messagesArea"></div>
  <div class="input-bar">
    <input class="msg-input" type="text" placeholder="Написати повідомлення..." id="msgInput" />
    <button class="send-btn" id="sendBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const chats = [
    { id: 1, name: 'Марія Федоренко',      lastMessage: 'Добре, домовились!',    time: '14:32', unread: 2, avatar: 'ОК' },
    { id: 2, name: 'Артем Якимащенко',   lastMessage: 'Дякую за інформацію',   time: '13:15', unread: 0, avatar: 'МП' },
    { id: 3, name: 'Фан клуб дискри',   lastMessage: 'Артем: Завтра о 10:00', time: '12:48', unread: 5, avatar: 'КП' },
    { id: 4, name: 'Святослав Мандзюк',   lastMessage: 'Побачимось!',           time: 'Вчора', unread: 0, avatar: 'АШ' },
    { id: 5, name: 'Катя Руденко',     lastMessage: 'Фото надіслала',        time: 'Вчора', unread: 0, avatar: 'СМ' },
  ];


  const messages = {
    1: [
      { id: 1, text: 'Привіт! Як справи?',          sent: false, time: '14:20' },
      { id: 2, text: 'Привіт! Все добре, дякую',    sent: true,  time: '14:25' },
      { id: 3, text: 'Можемо зустрітись завтра?',   sent: false, time: '14:28' },
      { id: 4, text: 'Так, звичайно! О котрій?',    sent: true,  time: '14:30' },
      { id: 5, text: 'Може о 15:00?',               sent: false, time: '14:31' },
      { id: 6, text: 'Добре, домовились!',          sent: false, time: '14:32' },
    ],
    2: [
      { id: 1, text: 'Надіслав файли',              sent: true,  time: '13:10' },
      { id: 2, text: 'Дякую за інформацію',         sent: false, time: '13:15' },
    ],
    3: [
      { id: 1, text: 'Всім привіт!',               sent: false, time: '10:20' },
      { id: 2, text: 'Коли наступна зустріч?',      sent: true,  time: '11:30' },
      { id: 3, text: 'Завтра о 10:00',             sent: false, time: '12:48' },
    ],
  };

  let selectedId = 1;
  let nextMsgId = 100;

  function getTime() {
    const d = new Date();
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function renderChatList(filter = '') {
    const list = document.getElementById('chatList');
    list.innerHTML = '';
    chats
      .filter(c => c.name.toLowerCase().includes(filter.toLowerCase()))
      .forEach(chat => {
        const item = document.createElement('div');
        item.className = 'chat-item' + (chat.id === selectedId ? ' active' : '');
        item.dataset.id = chat.id;
        item.innerHTML = `
          <div class="chat-item-inner">
            <div class="avatar">${chat.avatar}</div>
            <div class="chat-meta">
              <div class="chat-meta-top">
                <span class="chat-name">${chat.name}</span>
                <span class="chat-time">${chat.time}</span>
              </div>
              <div class="chat-meta-bottom">
                <span class="chat-preview">${chat.lastMessage}</span>
                ${chat.unread > 0 ? `<span class="unread-badge">${chat.unread}</span>` : ''}
              </div>
            </div>
          </div>`;
        item.addEventListener('click', () => selectChat(chat.id));
        list.appendChild(item);
      });
  }

  function renderTopbar() {
    const chat = chats.find(c => c.id === selectedId);
    document.getElementById('chatTopbar').innerHTML = `
      <div class="avatar">${chat.avatar}</div>
      <span class="chat-topbar-name">${chat.name}</span>`;
  }

  function renderMessages() {
    const area = document.getElementById('messagesArea');
    const msgs = messages[selectedId] || [];
    if (msgs.length === 0) {
      area.innerHTML = '<div class="no-messages">Немає повідомлень</div>';
      return;
    }
    area.innerHTML = msgs.map(m => `
      <div class="message-row ${m.sent ? 'sent' : 'received'}">
        <div class="bubble">
          <div class="bubble-text">${m.text}</div>
          <span class="bubble-time">${m.time}</span>
        </div>
      </div>`).join('');
    area.scrollTop = area.scrollHeight;
  }

  function selectChat(id) {
    selectedId = id;
    const c = chats.find(ch => ch.id === id);
    if (c) c.unread = 0;
    renderChatList(document.getElementById('searchInput').value);
    renderTopbar();
    renderMessages();
  }

  function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text) return;
    if (!messages[selectedId]) messages[selectedId] = [];
    messages[selectedId].push({ id: nextMsgId++, text, sent: true, time: getTime() });
    const chat = chats.find(c => c.id === selectedId);
    if (chat) { chat.lastMessage = text; chat.time = getTime(); }
    input.value = '';
    renderChatList(document.getElementById('searchInput').value);
    renderMessages();
  }

  document.getElementById('sendBtn').addEventListener('click', sendMessage);
  document.getElementById('msgInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  document.getElementById('searchInput').addEventListener('input', e => {
    renderChatList(e.target.value);
  });

  renderChatList();
  renderTopbar();
  renderMessages();
</script>
</body>
</html>
