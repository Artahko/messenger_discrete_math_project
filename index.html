<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bello — Encrypted Messenger</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a1628; color: #fff; height: 100vh; display: flex; overflow: hidden; }
    .sidebar { width: 320px; flex-shrink: 0; background: #0d1b2e; border-right: 1px solid #1a2942; display: flex; flex-direction: column; }
    .sidebar-header { padding: 18px 16px 14px; border-bottom: 1px solid #1a2942; }
    .sidebar-header h1 { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
    .sidebar-me { font-size: 12px; color: #4a8fdf; margin-bottom: 12px; }
    .search-wrap { position: relative; display: flex; gap: 8px; }
    .search-input { flex: 1; background: #0a1628; color: #fff; border: 1px solid #1a2942; border-radius: 10px; padding: 9px 14px; font-size: 14px; outline: none; transition: border-color .15s; }
    .search-input:focus { border-color: #2563eb; }
    .search-input::placeholder { color: #4a5f7f; }
    .add-btn { background: #2563eb; border: none; border-radius: 10px; padding: 0 14px; color: #fff; font-size: 20px; cursor: pointer; }
    .add-btn:hover { background: #1d4ed8; }
    .chat-list { flex: 1; overflow-y: auto; }
    .chat-list::-webkit-scrollbar { width: 4px; }
    .chat-list::-webkit-scrollbar-thumb { background: #1a2942; border-radius: 4px; }
    .chat-item { padding: 13px 16px; border-bottom: 1px solid #1a2942; cursor: pointer; transition: background .12s; }
    .chat-item:hover, .chat-item.active { background: #0a1628; }
    .chat-item-inner { display: flex; align-items: center; gap: 12px; }
    .avatar { width: 44px; height: 44px; border-radius: 50%; background: #1e3a5f; color: #60a5fa; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .chat-name { font-size: 15px; font-weight: 500; }
    .chat-nick { font-size: 12px; color: #4a5f7f; margin-top: 2px; }
    .chat-area { flex: 1; display: flex; flex-direction: column; }
    .chat-header { padding: 14px 20px; border-bottom: 1px solid #1a2942; display: flex; align-items: center; gap: 12px; }
    .chat-header .avatar { width: 38px; height: 38px; font-size: 11px; }
    .chat-header-info h2 { font-size: 15px; font-weight: 600; }
    .chat-header-info p { font-size: 12px; color: #4a5f7f; }
    .lock-badge { margin-left: auto; background: #0d2b0d; color: #4ade80; border: 1px solid #166534; border-radius: 20px; padding: 4px 12px; font-size: 11px; font-weight: 600; }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #1a2942; border-radius: 4px; }
    .msg { max-width: 68%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; }
    .msg.sent { align-self: flex-end; background: #2563eb; border-bottom-right-radius: 4px; }
    .msg.received { align-self: flex-start; background: #1a2942; border-bottom-left-radius: 4px; }
    .msg .meta { font-size: 11px; opacity: .55; margin-top: 4px; text-align: right; }
    .msg.received .meta { text-align: left; }
    .input-area { padding: 14px 20px; border-top: 1px solid #1a2942; display: flex; gap: 10px; align-items: flex-end; }
    .msg-input { flex: 1; background: #0d1b2e; color: #fff; border: 1px solid #1a2942; border-radius: 12px; padding: 12px 16px; font-size: 14px; outline: none; resize: none; transition: border-color .15s; max-height: 120px; }
    .msg-input:focus { border-color: #2563eb; }
    .send-btn { background: #2563eb; border: none; border-radius: 12px; padding: 12px 20px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
    .send-btn:hover { background: #1d4ed8; }
    .no-chat { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 10px; color: #4a5f7f; }
    .auth-screen { position: fixed; inset: 0; background: #0a1628; display: flex; align-items: center; justify-content: center; z-index: 100; }
    .auth-box { background: #0d1b2e; border: 1px solid #1a2942; border-radius: 20px; padding: 36px; width: 400px; }
    .auth-box h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .auth-box .subtitle { color: #4a5f7f; font-size: 13px; margin-bottom: 24px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 12px; color: #4a8fdf; margin-bottom: 5px; font-weight: 500; }
    .field input { width: 100%; background: #0a1628; color: #fff; border: 1px solid #1a2942; border-radius: 10px; padding: 11px 14px; font-size: 14px; outline: none; transition: border-color .15s; }
    .field input:focus { border-color: #2563eb; }
    .field-err { font-size: 11px; color: #f87171; margin-top: 4px; }
    .auth-btn { width: 100%; background: #2563eb; border: none; border-radius: 10px; padding: 13px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 6px; }
    .auth-btn:hover { background: #1d4ed8; }
    .auth-switch { text-align: center; color: #4a5f7f; font-size: 13px; margin-top: 14px; }
    .auth-switch a { color: #60a5fa; cursor: pointer; }
    .global-err { color: #f87171; font-size: 13px; margin-bottom: 10px; }
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center; z-index: 200; }
    .modal { background: #0d1b2e; border: 1px solid #1a2942; border-radius: 16px; padding: 28px; width: 360px; }
    .modal h3 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
    .modal-input { width: 100%; background: #0a1628; color: #fff; border: 1px solid #1a2942; border-radius: 10px; padding: 11px 14px; font-size: 14px; outline: none; margin-bottom: 12px; }
    .modal-input:focus { border-color: #2563eb; }
    .modal-result { background: #0a1628; border: 1px solid #1a2942; border-radius: 10px; padding: 14px; margin-bottom: 12px; display: none; }
    .modal-result .r-name { font-size: 15px; font-weight: 600; }
    .modal-result .r-nick { font-size: 12px; color: #4a8fdf; margin-top: 2px; }
    .modal-result .r-phone { font-size: 12px; color: #4a5f7f; margin-top: 2px; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btn { flex: 1; border: none; border-radius: 10px; padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .modal-btn.primary { background: #2563eb; color: #fff; }
    .modal-btn.primary:hover { background: #1d4ed8; }
    .modal-btn.secondary { background: #1a2942; color: #a0b4c8; }
    .modal-btn.secondary:hover { background: #243550; }
    .modal-err { color: #f87171; font-size: 13px; margin-bottom: 10px; display: none; }
  </style>
</head>
<body>

<div class="auth-screen" id="authScreen">
  <div class="auth-box">
    <h2 id="authTitle">Увійти</h2>
    <div class="subtitle">Всі повідомлення шифруються ECC + AES-256</div>
    <div class="global-err" id="globalErr" style="display:none"></div>
    <div id="authFields"></div>
    <button class="auth-btn" id="authBtn">Увійти</button>
    <div class="auth-switch">
      <span id="authSwitchText">Немає акаунту?</span>
      <a id="authSwitchLink"> Зареєструватися</a>
    </div>
  </div>
</div>

<div class="modal-bg" id="addModal" style="display:none">
  <div class="modal">
    <h3>Додати контакт</h3>
    <input class="modal-input" id="searchQ" placeholder="Нікнейм (@nick) або телефон (+380...)" />
    <div class="modal-err" id="searchErr"></div>
    <div class="modal-result" id="searchResult">
      <div class="r-name" id="rName"></div>
      <div class="r-nick" id="rNick"></div>
      <div class="r-phone" id="rPhone"></div>
    </div>
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="closeModal()">Скасувати</button>
      <button class="modal-btn primary" id="searchBtn" onclick="doSearch()">Знайти</button>
    </div>
  </div>
</div>

<div class="sidebar">
  <div class="sidebar-header">
    <h1>Bello 🔐</h1>
    <div class="sidebar-me" id="sidebarMe"></div>
    <div class="search-wrap">
      <input class="search-input" id="filterInput" placeholder="Фільтр контактів..." />
      <button class="add-btn" title="Додати контакт" onclick="openModal()">+</button>
    </div>
  </div>
  <div class="chat-list" id="chatList"></div>
</div>

<div class="chat-area" id="chatArea">
  <div class="no-chat">
    <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="opacity:.3">
      <path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-5l-5 5v-5z"/>
    </svg>
    <p>Оберіть розмову або додайте контакт (+)</p>
  </div>
</div>

<script>
//ECC secp256k1
const ECC = (() => {
  const a=0n, p=0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFEFFFFFC2Fn;
  const Gx=55066263022277343669578718895168534326250603453777594175500187360389116729240n;
  const Gy=32670510020758816978083085130507043184471273380659243275938904335757337482424n;
  const n=0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFEBAAEDCE6AF48A03BBFD25E8CD0364141n;
  const G=[Gx,Gy];
  const mp=(b,e,m)=>{let r=1n;b%=m;while(e>0n){if(e&1n)r=r*b%m;b=b*b%m;e>>=1n;}return r;};
  const inv=(x,m)=>mp(((x%m)+m)%m,m-2n,m);
  const addP=(P,Q)=>{if(!P)return Q;if(!Q)return P;let s;if(P[0]===Q[0]&&P[1]===Q[1]){s=(3n*P[0]**2n+a)*inv(2n*P[1],p)%p;}else{if(P[0]===Q[0])return null;s=(Q[1]-P[1])*inv(Q[0]-P[0],p)%p;}const x=((s**2n-P[0]-Q[0])%p+p)%p,y=((s*(P[0]-x)-P[1])%p+p)%p;return[x,y];};
  const mul=(k,P)=>{let R=null,Q=P;while(k>0n){if(k&1n)R=addP(R,Q);Q=addP(Q,Q);k>>=1n;}return R;};
  const genKeys=()=>{const arr=new Uint8Array(32);crypto.getRandomValues(arr);let d=0n;for(const b of arr)d=(d<<8n)|BigInt(b);d=(d%(n-1n))+1n;return{d,Q:mul(d,G)};};
  const shared=(Qo,ds)=>{const pt=mul(ds,Qo);const xs=pt[0].toString().padStart(32,'0').slice(0,32);return new TextEncoder().encode(xs);};
  return{genKeys,shared};
})();

//AES-CBC
const AES={
  async imp(k){return crypto.subtle.importKey("raw",k,{name:"AES-CBC"},false,["encrypt","decrypt"]);},
  async enc(kb,pt){const k=await this.imp(kb),iv=crypto.getRandomValues(new Uint8Array(16)),ct=await crypto.subtle.encrypt({name:"AES-CBC",iv},k,new TextEncoder().encode(pt)),r=new Uint8Array(16+ct.byteLength);r.set(iv);r.set(new Uint8Array(ct),16);return r;},
  async dec(kb,d){const k=await this.imp(kb),pt=await crypto.subtle.decrypt({name:"AES-CBC",iv:d.slice(0,16)},k,d.slice(16));return new TextDecoder().decode(pt);}
};

// State
const API="http://127.0.0.1:8000";
let token=localStorage.getItem("token");
let myId=+localStorage.getItem("myId")||null;
let myNick=localStorage.getItem("myNick")||"";
let myDisplay=localStorage.getItem("myDisplay")||"";
let myPrivKey=null, myPubKey=null;
const sharedKeys={};
let ws=null, activeUserId=null;
let contacts=[], foundUser=null;

//Auth
let authMode="login";
const loginFields=`
  <div class="field"><label>Нікнейм або телефон</label><input id="f_login" placeholder="@nick або +380..."/><div class="field-err" id="e_login"></div></div>
  <div class="field"><label>Пароль</label><input id="f_password" type="password" placeholder="••••••"/><div class="field-err" id="e_password"></div></div>`;
const registerFields=`
  <div class="field"><label>Нікнейм (унікальний)</label><input id="f_nickname" placeholder="my_nick_123"/><div class="field-err" id="e_nickname"></div></div>
  <div class="field"><label>Імʼя</label><input id="f_display_name" placeholder="Олексій"/><div class="field-err" id="e_display_name"></div></div>
  <div class="field"><label>Телефон</label><input id="f_phone" placeholder="+380XXXXXXXXX"/><div class="field-err" id="e_phone"></div></div>
  <div class="field"><label>Пароль (мін. 6 символів)</label><input id="f_password" type="password" placeholder="••••••••"/><div class="field-err" id="e_password"></div></div>`;

function renderAuthForm(){
  const il=authMode==="login";
  document.getElementById("authTitle").textContent=il?"Увійти":"Реєстрація";
  document.getElementById("authBtn").textContent=il?"Увійти":"Зареєструватися";
  document.getElementById("authSwitchText").textContent=il?"Немає акаунту?":"Вже є акаунт?";
  document.getElementById("authSwitchLink").textContent=il?" Зареєструватися":" Увійти";
  document.getElementById("authFields").innerHTML=il?loginFields:registerFields;
  document.getElementById("globalErr").style.display="none";
}
renderAuthForm();
document.getElementById("authSwitchLink").onclick=()=>{authMode=authMode==="login"?"register":"login";renderAuthForm();};

document.getElementById("authBtn").onclick=async()=>{
  const ge=document.getElementById("globalErr"); ge.style.display="none";
  if(authMode==="login"){
    const login=document.getElementById("f_login").value.trim();
    const password=document.getElementById("f_password").value;
    const res=await fetch(`${API}/api/login/`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({login,password})});
    const data=await res.json();
    if(!res.ok){ge.textContent=data.error||"Помилка";ge.style.display="block";return;}
    saveSession(data); await initApp();
  } else {
    const nickname=document.getElementById("f_nickname").value.trim();
    const display_name=document.getElementById("f_display_name").value.trim();
    const phone=document.getElementById("f_phone").value.trim();
    const password=document.getElementById("f_password").value;
    ["nickname","display_name","phone","password"].forEach(f=>{const el=document.getElementById("e_"+f);if(el)el.textContent="";});
    const res=await fetch(`${API}/api/register/`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({nickname,display_name,phone,password})});
    const data=await res.json();
    if(!res.ok){
      if(data.errors){Object.entries(data.errors).forEach(([k,v])=>{const el=document.getElementById("e_"+k);if(el)el.textContent=v;});}
      else{ge.textContent=data.error||"Помилка";ge.style.display="block";}
      return;
    }
    saveSession(data); await initApp();
  }
};

function saveSession(d){
  token=d.token; myId=d.user_id; myNick=d.nickname; myDisplay=d.display_name;
  localStorage.setItem("token",token); localStorage.setItem("myId",myId);
  localStorage.setItem("myNick",myNick); localStorage.setItem("myDisplay",myDisplay);
}

//Init
async function initApp(){
  document.getElementById("authScreen").style.display="none";
  document.getElementById("sidebarMe").textContent=`@${myNick} · ${myDisplay}`;

  const sk=localStorage.getItem("eccPrivKey_"+myId);
  const sx=localStorage.getItem("eccPubX_"+myId);
  const sy=localStorage.getItem("eccPubY_"+myId);
  if(sk&&sx&&sy){
    myPrivKey=BigInt(sk); myPubKey=[BigInt(sx),BigInt(sy)];
  } else {
    const kp=ECC.genKeys(); myPrivKey=kp.d; myPubKey=kp.Q;
    localStorage.setItem("eccPrivKey_"+myId, myPrivKey.toString());
    localStorage.setItem("eccPubX_"+myId, myPubKey[0].toString());
    localStorage.setItem("eccPubY_"+myId, myPubKey[1].toString());
  }

  await fetch(`${API}/api/keys/upload/`,{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Token ${token}`},body:JSON.stringify({x:myPubKey[0].toString(),y:myPubKey[1].toString()})});
  await loadContacts();
  connectWS();
}

// Contacts
async function loadContacts(){
  const res=await fetch(`${API}/api/contacts/`,{headers:{"Authorization":`Token ${token}`}});
  contacts=await res.json();
  renderContacts(contacts);
}

function renderContacts(list){
  const el=document.getElementById("chatList"); el.innerHTML="";
  if(!list.length){el.innerHTML=`<div style="padding:20px;color:#4a5f7f;font-size:13px;text-align:center">Немає контактів.<br>Натисніть + щоб додати.</div>`;return;}
  list.forEach(c=>{
    const div=document.createElement("div");
    div.className="chat-item"+(c.user_id===activeUserId?" active":"");
    div.innerHTML=`<div class="chat-item-inner"><div class="avatar">${c.display_name.slice(0,2).toUpperCase()}</div><div><div class="chat-name">${esc(c.display_name)}</div><div class="chat-nick">@${esc(c.nickname)}</div></div></div>`;
    div.onclick=()=>openChat(c,div);
    el.appendChild(div);
  });
}

document.getElementById("filterInput").oninput=e=>{
  const q=e.target.value.toLowerCase();
  renderContacts(contacts.filter(c=>c.nickname.toLowerCase().includes(q)||c.display_name.toLowerCase().includes(q)));
};

// Chat
async function openChat(contact, el){
  activeUserId=contact.user_id;
  document.querySelectorAll(".chat-item").forEach(i=>i.classList.remove("active"));
  if(el) el.classList.add("active");
  if(!sharedKeys[contact.user_id]) await computeSharedKey(contact.user_id);

  const ca=document.getElementById("chatArea");
  ca.innerHTML=`
    <div class="chat-header">
      <div class="avatar">${contact.display_name.slice(0,2).toUpperCase()}</div>
      <div class="chat-header-info"><h2>${esc(contact.display_name)}</h2><p>@${esc(contact.nickname)} · ${esc(contact.phone)}</p></div>
      <div class="lock-badge">🔒 E2E</div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <textarea class="msg-input" id="msgInput" placeholder="Повідомлення..." rows="1"></textarea>
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>`;

  document.getElementById("msgInput").onkeydown=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}};

  const res=await fetch(`${API}/api/messages/${contact.user_id}/`,{headers:{"Authorization":`Token ${token}`}});
  const history=await res.json();
  for(const m of history) await renderMessage(m.ciphertext, m.from===myId?"sent":"received", new Date(m.timestamp));
}

async function computeSharedKey(uid){
  const res=await fetch(`${API}/api/keys/${uid}/`,{headers:{"Authorization":`Token ${token}`}});
  if(!res.ok) return;
  const d=await res.json();
  sharedKeys[uid]=ECC.shared([BigInt(d.x),BigInt(d.y)],myPrivKey);
}

//Send / render
async function sendMessage(){
  const inp=document.getElementById("msgInput");
  const text=inp.value.trim();
  if(!text||!activeUserId) return;
  inp.value="";

  const kb=sharedKeys[activeUserId];
  if(!kb){alert("Немає ключа — зачекайте поки співрозмовник онлайн");return;}

  const cb=await AES.enc(kb,text);
  const b64=btoa(String.fromCharCode(...cb));

  await renderMessage(b64,"sent");

  if(ws&&ws.readyState===WebSocket.OPEN){
    ws.send(JSON.stringify({to:activeUserId,ciphertext:b64}));
  }
}

async function renderMessage(b64, dir, time=new Date()){
  const c=document.getElementById("messages"); if(!c) return;
  let text="[не вдалося розшифрувати]";
  try{
    const uid = dir==="sent" ? activeUserId : activeUserId;
    const kb=sharedKeys[uid];
    if(kb){const cb=Uint8Array.from(atob(b64),x=>x.charCodeAt(0));text=await AES.dec(kb,cb);}
  }catch(e){console.warn("decrypt error",e);}
  const div=document.createElement("div");
  div.className=`msg ${dir}`;
  div.innerHTML=`${esc(text)}<div class="meta">${time.toLocaleTimeString("uk",{hour:"2-digit",minute:"2-digit"})}</div>`;
  c.appendChild(div);
  c.scrollTop=c.scrollHeight;
}

//Modal
function openModal(){
  document.getElementById("addModal").style.display="flex";
  document.getElementById("searchQ").value="";
  document.getElementById("searchErr").style.display="none";
  document.getElementById("searchResult").style.display="none";
  document.getElementById("searchBtn").textContent="Знайти";
  document.getElementById("searchBtn").onclick=doSearch;
  foundUser=null;
}
function closeModal(){document.getElementById("addModal").style.display="none";}

async function doSearch(){
  const q=document.getElementById("searchQ").value.trim();
  const errEl=document.getElementById("searchErr");
  const resEl=document.getElementById("searchResult");
  errEl.style.display="none"; resEl.style.display="none";
  if(!q){errEl.textContent="Введіть нікнейм або телефон";errEl.style.display="block";return;}
  const res=await fetch(`${API}/api/search/?q=${encodeURIComponent(q)}`,{headers:{"Authorization":`Token ${token}`}});
  if(!res.ok){errEl.textContent="Помилка сервера";errEl.style.display="block";return;}
  const data=await res.json();
  if(!data.found){errEl.textContent=data.error||"Користувача не знайдено";errEl.style.display="block";return;}
  foundUser=data;
  document.getElementById("rName").textContent=data.display_name;
  document.getElementById("rNick").textContent="@"+data.nickname;
  document.getElementById("rPhone").textContent=data.phone;
  resEl.style.display="block";
  if(data.already_contact){
    document.getElementById("searchBtn").textContent="Вже в контактах";
    document.getElementById("searchBtn").onclick=null;
  } else {
    document.getElementById("searchBtn").textContent="Додати";
    document.getElementById("searchBtn").onclick=doAdd;
  }
}

async function doAdd(){
  if(!foundUser) return;
  await fetch(`${API}/api/contacts/add/`,{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Token ${token}`},body:JSON.stringify({user_id:foundUser.user_id})});
  closeModal(); await loadContacts();
}

// WebSocket
function connectWS(){
  ws=new WebSocket(`ws://127.0.0.1:8000/ws/chat/?token=${token}`);
  ws.onopen=()=>console.log("[WS] connected");
  ws.onclose=()=>{console.log("[WS] reconnecting…");setTimeout(connectWS,2000);};
  ws.onmessage=async e=>{
    const d=JSON.parse(e.data);
    if(d.from!==undefined && d.ciphertext){
      const sid=d.from;
      if(!sharedKeys[sid]) await computeSharedKey(sid);
      if(activeUserId===sid) await renderMessage(d.ciphertext,"received");
    }
  };
}

function clearSession(){
  localStorage.removeItem("token"); localStorage.removeItem("myId");
  localStorage.removeItem("myNick"); localStorage.removeItem("myDisplay");
  if(myId){
    localStorage.removeItem("eccPrivKey_"+myId);
    localStorage.removeItem("eccPubX_"+myId);
    localStorage.removeItem("eccPubY_"+myId);
  }
  token=null; myId=null; myNick=""; myDisplay="";
}

function showAuth(){document.getElementById("authScreen").style.display="flex";}

async function tryAutoLogin(){
  if(!token||!myId){showAuth();return;}
  try{
    const res=await fetch(`${API}/api/me/`,{headers:{"Authorization":`Token ${token}`}});
    if(!res.ok){clearSession();showAuth();return;}
    await initApp();
  }catch(e){showAuth();}
}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

tryAutoLogin();
</script>
